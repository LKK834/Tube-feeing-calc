<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="TF Calc">
    <link rel="apple-touch-icon" href="./IMG_3272.png">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed', err));
        });
      }
    </script>

    <title>Tube Feeding Calculator | Dietitian Pro</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; padding: 15px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h2 { color: #007aff; text-align: center; margin-bottom: 20px; font-size: 22px; }
        label { font-weight: bold; display: block; margin-top: 12px; font-size: 14px; color: #555; }
        select, input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 16px; background-color: #fafafa; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .result-section { margin-top: 25px; border-top: 2px solid #eee; padding-top: 15px; }
        .section-title { font-size: 16px; font-weight: bold; color: #007aff; margin: 15px 0 10px 0; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .metric { background: #f8fbff; border: 1px solid #ddecff; padding: 10px; border-radius: 8px; text-align: center; }
        .daily { background: #fff9f0; border: 1px solid #ffedcc; }
        .metric-title { font-size: 11px; color: #777; margin-bottom: 2px; }
        .metric-value { font-size: 16px; font-weight: bold; color: #333; }
        .total-val { color: #e67e22; font-size: 18px; }
        .footer { text-align: center; font-size: 11px; color: #999; margin-top: 20px; }
        .highlight { border: 2px solid #e67e22; }
        .strength-input { border: 2px solid #28a745; }
        #icu-warning { color: #dc3545; font-size: 11px; margin-top: 4px; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>🏥 Tube Feeding Calculator</h2>
    
    <label>1. Select Formula</label>
    <select id="prod" onchange="calc()"></select>

    <div class="input-row">
        <div>
            <label>2. Vol. per feed (ml)</label>
            <input type="number" id="vol" value="250" oninput="updateActualDefault(); calc();">
        </div>
        <div>
            <label>3. Strength (e.g. 0.5)</label>
            <input type="number" id="strength" value="1.0" step="0.1" oninput="calc()" class="strength-input">
        </div>
    </div>

    <div class="input-row">
        <div>
            <label>4. Number of feeds per day</label>
            <input type="number" id="freq" value="4" step="1" oninput="calc()">
        </div>
        <div>
            <label>5. Water flush (ml)</label>
            <input type="number" id="flush" value="50" oninput="calc()">
        </div>
    </div>

    <label style="color: #e67e22;">6. Add Beneprotein (g)</label>
    <input type="number" id="bene_g" value="0" step="1" oninput="calc()" class="highlight">

    <label>7. Actual vol. per feed (for ICU)</label>
    <input type="number" id="actual_vol" value="250" oninput="calc()">
    <div id="icu-warning">⚠️ Cannot exceed prepared volume!</div>

    <div class="result-section">
        <div class="section-title">🍽️ Per feed (Administered)</div>
        <div class="result-grid">
            <div class="metric"><div class="metric-title">Energy (kcal)</div><div class="metric-value" id="sKcal">0</div></div>
            <div class="metric"><div class="metric-title">CHO (g)</div><div class="metric-value" id="sCho">0</div></div>
            <div class="metric"><div class="metric-title">Protein (g)</div><div class="metric-value" id="sProt">0</div></div>
            <div class="metric"><div class="metric-title">Fat (g)</div><div class="metric-value" id="sFat">0</div></div>
        </div>
    </div>

    <div class="result-section">
        <div class="section-title">📅 Daily Total</div>
        <div class="result-grid">
            <div class="metric daily"><div class="metric-title">Energy (kcal)</div><div class="metric-value total-val" id="dKcal">0</div></div>
            <div class="metric daily"><div class="metric-title">CHO (g)</div><div class="metric-value total-val" id="dCho">0</div></div>
            <div class="metric daily"><div class="metric-title">Protein (g)</div><div class="metric-value total-val" id="dProt">0</div></div>
            <div class="metric daily"><div class="metric-title">Fat (g)</div><div class="metric-value total-val" id="dFat">0</div></div>
            <div class="metric daily"><div class="metric-title">Na (mg)</div><div class="metric-value" id="dNa">0</div></div>
            <div class="metric daily"><div class="metric-title">K (mg)</div><div class="metric-value" id="dK">0</div></div>
            <div class="metric daily"><div class="metric-title">PO4 (mg)</div><div class="metric-value" id="dPo4">0</div></div>
            <div class="metric daily"><div class="metric-title">Ca (mg)</div><div class="metric-value" id="dCa">0</div></div>
            <div class="metric daily" style="grid-column: span 2;"><div class="metric-title">Total Fluid (ml)</div><div class="metric-value total-val" id="dFluid">0</div></div>
        </div>
    </div>
    
    <div class="footer">(c) Patrick Luk 2026</div>
</div>

<script>
const db = [
    { n: "Compleat", kcal: 1060, cho: 128, prot: 48, fat: 40, na: 1000, k: 1560, ca: 880, po4: 840 },
    { n: "Diben Drink (Vanilla)", kcal: 1500, cho: 131, prot: 75, fat: 70, na: 650, k: 1300, ca: 1500, po4: 950 },
    { n: "Fresubin 2kcal Drink", kcal: 2000, cho: 225, prot: 100, fat: 78, na: 600, k: 1600, ca: 2050, po4: 1200 },
    { n: "Fresubin Energy Drink", kcal: 1500, cho: 188, prot: 56, fat: 58, na: 800, k: 1350, ca: 1350, po4: 800 },
    { n: "Fresubin Energy Fibre Drink", kcal: 1500, cho: 178, prot: 56, fat: 58, na: 800, k: 1350, ca: 1350, po4: 800 },
    { n: "Fresubin Energy Fibre (Closed)", kcal: 1500, cho: 180, prot: 56, fat: 58, na: 1000, k: 2070, ca: 670, po4: 530 },
    { n: "Fresbuin Original", kcal: 1000, cho: 138, prot: 38, fat: 34, na: 750, k: 1250, ca: 600, po4: 470 },
    { n: "Glucerna (Tube Feed)", kcal: 1000, cho: 80, prot: 40, fat: 56, na: 932, k: 1560, ca: 720, po4: 720 },
    { n: "Isocal HN", kcal: 1050, cho: 135, prot: 44, fat: 37, na: 1000, k: 1200, ca: 900, po4: 750 },
    { n: "Isosource 1.2HN", kcal: 1200, cho: 157, prot: 54, fat: 40, na: 1090, k: 1600, ca: 910, po4: 590 },
    { n: "Isosource 1.5Cal", kcal: 1510, cho: 167, prot: 65, fat: 64, na: 1000, k: 1670, ca: 1000, po4: 700 },
    { n: "Jevity", kcal: 1060, cho: 152, prot: 44, fat: 36, na: 740, k: 1240, ca: 910, po4: 760 },
    { n: "Nepro HP", kcal: 1823, cho: 147, prot: 81, fat: 98, na: 700, k: 1059, ca: 1059, po4: 718 },
    { n: "Nepro LP", kcal: 1823, cho: 185, prot: 45, fat: 97, na: 800, k: 1141, ca: 732, po4: 650 },
    { n: "Osmolite HN", kcal: 1060, cho: 141, prot: 44, fat: 36, na: 770, k: 1320, ca: 760, po4: 760 },
    { n: "Peptamen with Prebio", kcal: 1000, cho: 124, prot: 40, fat: 40, na: 480, k: 1600, ca: 800, po4: 700 },
    { n: "Pulmocare", kcal: 1498, cho: 105, prot: 62.4, fat: 93.2, na: 1308, k: 1962, ca: 1055, po4: 1055 },
    { n: "Resource 2.0", kcal: 2000, cho: 214, prot: 90, fat: 87, na: 1100, k: 1900, ca: 1750, po4: 1200 },
    { n: "Resource Diabetic", kcal: 1040, cho: 84, prot: 60, fat: 51, na: 1030, k: 1180, ca: 880, po4: 680 },
    { n: "Ultracal", kcal: 1010, cho: 130, prot: 44, fat: 35, na: 1000, k: 1150, ca: 800, po4: 700 },
    { n: "Vivonex Plus", kcal: 1000, cho: 190, prot: 40, fat: 10, na: 670, k: 1000, ca: 570, po4: 570 }
];

const bene_base = { g: 7, kcal: 25, prot: 6, na: 15 };

const sel = document.getElementById('prod');
db.forEach(p => {
    let o = document.createElement('option');
    o.value = p.n; o.innerHTML = p.n;
    sel.appendChild(o);
});

function updateActualDefault() {
    const vol = document.getElementById('vol').value;
    document.getElementById('actual_vol').value = vol;
}

function calc() {
    const p = db.find(x => x.n === sel.value);
    const vol = parseFloat(document.getElementById('vol').value) || 0;
    const strength = parseFloat(document.getElementById('strength').value) || 1.0;
    const freq = parseFloat(document.getElementById('freq').value) || 0;
    const flush = parseFloat(document.getElementById('flush').value) || 0;
    const g = parseFloat(document.getElementById('bene_g').value) || 0;
    let actualVolInput = parseFloat(document.getElementById('actual_vol').value) || 0;

    // Warning logic
    const warn = document.getElementById('icu-warning');
    if (actualVolInput > vol) {
        warn.style.display = 'block';
        actualVolInput = vol; // Revert calculation logic to cap at prepared volume
    } else {
        warn.style.display = 'none';
    }

    // Ratio of administration (How much of the prepared feed actually enters the patient)
    const adminRatio = vol > 0 ? (actualVolInput / vol) : 0;
    
    // Total prepared nutrients (Apply strength to base formula)
    const rPrepared = (vol / 1000) * strength;
    const bene_r = g / bene_base.g;
    
    // Nutrients delivered based on Actual Vol
    const sKcal = ((p.kcal * rPrepared) + (bene_base.kcal * bene_r)) * adminRatio;
    const sCho = (p.cho * rPrepared) * adminRatio;
    const sProt = ((p.prot * rPrepared) + (bene_base.prot * bene_r)) * adminRatio;
    const sFat = (p.fat * rPrepared) * adminRatio;

    document.getElementById('sKcal').innerText = Math.round(sKcal);
    document.getElementById('sCho').innerText = sCho.toFixed(1);
    document.getElementById('sProt').innerText = sProt.toFixed(1);
    document.getElementById('sFat').innerText = sFat.toFixed(1);

    // Daily Total Delivered
    document.getElementById('dKcal').innerText = Math.round(sKcal * freq);
    document.getElementById('dCho').innerText = (sCho * freq).toFixed(1);
    document.getElementById('dProt').innerText = (sProt * freq).toFixed(1);
    document.getElementById('dFat').innerText = (sFat * freq).toFixed(1);
    document.getElementById('dNa').innerText = Math.round((((p.na * rPrepared) + (bene_base.na * bene_r)) * adminRatio) * freq);
    document.getElementById('dK').innerText = Math.round((p.k * rPrepared * adminRatio) * freq);
    document.getElementById('dPo4').innerText = Math.round((p.po4 * rPrepared * adminRatio) * freq);
    document.getElementById('dCa').innerText = Math.round((p.ca * rPrepared * adminRatio) * freq);
    document.getElementById('dFluid').innerText = Math.round((actualVolInput + flush) * freq);
}
calc();
</script>
</body>
</html>
